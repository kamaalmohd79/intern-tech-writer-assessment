openapi: 3.0.0
info:
  title: Account Service
  version: 1.0.0

paths:
  /auth/login:
    post:
      summary: login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: ok
        '401':
          description: invalid

  /users:
    get:
      summary: get users
      responses:
        '200':
          description: ok
